name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile
      - run: bun run build

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync Socket badge version in README
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i -E "s#(badge\.socket\.dev/npm/package/@soralabsoss/sora-cli/)[^)]+#\1${VERSION}#; s#(socket\.dev/npm/package/@soralabsoss/sora-cli/overview/)[^)]+#\1${VERSION}#" README.md
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: sync Socket badge to v${VERSION}"
            git push origin HEAD:main
          fi
